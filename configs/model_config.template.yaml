# PaperBanana-Bedrock model configuration template
# Copy this to configs/model_config.yaml and customize. The real file is gitignored.

aws:
  # Either use a named profile (recommended) or omit to use the default chain
  profile: null            # e.g., "my-profile"
  region: ap-northeast-2   # Seoul

bedrock:
  # Claude Sonnet 4.6 via cross-region inference profile (Seoul-compatible)
  model_id: global.anthropic.claude-sonnet-4-6
  max_tokens: 4096
  temperature: 0.7
  top_p: 0.95

defaults:
  main_model_name: global.anthropic.claude-sonnet-4-6
  image_gen_model_name: stub.prompt-md-writer

output:
  dir: ./outputs
